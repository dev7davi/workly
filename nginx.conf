server {
    listen 80;
    server_name localhost;

    # Onde os arquivos do React/Vite ficarão no container
    root /usr/share/nginx/html;
    index index.html;

    # Habilitar compressão GZIP para melhor performance de rede
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Configuração crucial para Single Page Applications (SPA)
    # Redireciona tudo que não for arquivo real para o index.html (React Router lida com a rota da UI)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Melhorar o cache de assets estáticos gerados pelo Vite (js, css, imagens)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Prevenir exibição de listagem de diretórios (segurança)
    autoindex off;

    # Segurança basica: Desliga a exibição da versão do nginx no cabeçalho
    server_tokens off;
}
